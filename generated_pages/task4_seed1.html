<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Train Booking</title>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: #f5f5f7; color: #222; }
  .zgdpamnt-header { background: #111827; color: white; padding: 1rem 2rem; }
  .zgdpamnt-container { max-width: 900px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
  .zgdpamnt-field { margin-bottom: 1.25rem; }
  .zgdpamnt-field label { display: block; font-weight: 600; margin-bottom: .4rem; }
  .zgdpamnt-field input, .zgdpamnt-field select {
    width: 100%; padding: .65rem; font-size: 1rem;
    border: 1px solid #d1d5db; border-radius: 6px;
  }
  .zgdpamnt-btn {
    padding: .75rem 1.5rem; font-size: 1rem; background: #2563eb; color: white;
    border: none; border-radius: 6px; cursor: pointer;
  }
  .zgdpamnt-btn:hover { background: #1d4ed8; }
  .zgdpamnt-results-row { border-bottom: 1px solid #e5e7eb; padding: 1rem 0; display: flex; justify-content: space-between; align-items: center; }
  .zgdpamnt-banner { background: #fef3c7; padding: .75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
  .zgdpamnt-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex;
    align-items: center; justify-content: center; z-index: 100;
  }
  .zgdpamnt-modal {
    background: white; padding: 2rem; border-radius: 12px; max-width: 500px;
  }
  .zgdpamnt-confirmation {
    background: #d1fae5; padding: 1.5rem; border-radius: 8px; margin-top: 1rem;
  }
  .zgdpamnt-sidebar {
    width: 250px; float: left; padding: 1rem; background: #f3f4f6; min-height: 100vh;
  }
</style>
</head>
<body x-data="bookingApp()">

  
  
    <div class="zgdpamnt-header" role="banner">
      <h1>TrainBook Express</h1>
      <nav role="navigation">
        <a href="#" style="color:white;margin-right:1rem;">Home</a>
        <a href="#" style="color:white;margin-right:1rem;">My Bookings</a>
        <a href="#" style="color:white;">Help</a>
      </nav>
    </div>
  

  
  
    <div x-show="showCookieBanner" class="zgdpamnt-banner" role="alert">
      <span>We use cookies to improve your experience</span>
      <button
        class="zgdpamnt-btn"
        x-on:click="showCookieBanner = false"
        aria-label="Accept cookies"
      >Accept</button>
    </div>
  

  
  <div class="zgdpamnt-container" x-show="currentPage === 'search'" role="main">
    <h2>Search Trains</h2>
    <form x-on:submit.prevent="submitSearch()" role="form" aria-label="Search Trains">
      
        
          <div class="zgdpamnt-field">
            <label for="zgdpamnt_origin">From</label>
            <input
              id="zgdpamnt_origin"
              type="text"
              name="from"
              x-model="form.origin"
              aria-label="From"
              placeholder="Enter origin city"
            />
          </div>
        
      
        
          <div class="zgdpamnt-field">
            <label for="zgdpamnt_destination">Arrive</label>
            <input
              id="zgdpamnt_destination"
              type="text"
              name="arrive"
              x-model="form.destination"
              aria-label="Arrive"
              placeholder="Enter destination city"
            />
          </div>
        
      
        
          <div class="zgdpamnt-field">
            <label for="zgdpamnt_class">Booking Class</label>
            <select
              id="zgdpamnt_class"
              name="booking_class"
              x-model="form.travelClass"
              aria-label="Booking Class"
            >
              <option value="">-- Select --</option>
              
                <option value="Sleeper (SL)">Sleeper (SL)</option>
              
                <option value="AC 3 Tier (3A)">AC 3 Tier (3A)</option>
              
                <option value="AC 2 Tier (2A)">AC 2 Tier (2A)</option>
              
                <option value="AC 1st Class (1A)">AC 1st Class (1A)</option>
              
                <option value="Chair Car (CC)">Chair Car (CC)</option>
              
                <option value="Second Sitting (2S)">Second Sitting (2S)</option>
              
            </select>
          </div>
        
      

      <button
        type="submit"
        class="zgdpamnt-btn"
        aria-label="Check Availability"
      >Check Availability</button>
    </form>
  </div>

  
  <div class="zgdpamnt-container" x-show="currentPage === 'results'" role="main">
    <h2>Available Trains</h2>
    <template x-for="train in trains" :key="train.id">
      <div class="zgdpamnt-results-row">
        <div>
          <strong x-text="train.name"></strong><br>
          <span x-text="train.time"></span>
        </div>
        <button
          class="zgdpamnt-btn"
          x-on:click="selectTrain(train)"
          x-bind:aria-label="'Confirm Booking ' + train.name"
        >Confirm Booking</button>
      </div>
    </template>
    <button x-on:click="currentPage = 'search'" style="margin-top:1rem;">Back to search</button>
  </div>

  
  <div class="zgdpamnt-container" x-show="currentPage === 'confirm'" role="main">
    <h2>Confirm Your Booking</h2>
    <p>Review details below and confirm.</p>
    <ul>
      <li>From: <span x-text="form.origin"></span></li>
      <li>To: <span x-text="form.destination"></span></li>
      <li>Class: <span x-text="form.travelClass"></span></li>
      <li x-show="selectedTrain">Train: <span x-text="selectedTrain && selectedTrain.name"></span></li>
    </ul>
    <button
      class="zgdpamnt-btn"
      x-on:click="confirmBooking()"
      aria-label="Finalize"
    >Finalize</button>
  </div>

  
  <div class="zgdpamnt-container" x-show="currentPage === 'done'" role="main">
    <div class="zgdpamnt-confirmation">
      <h2>Booking Confirmed!</h2>
      <p>Your booking reference:</p>
      <p><strong x-text="bookingId"></strong></p>
    </div>
  </div>

  
  

  <script>
    function bookingApp() {
      return {
        currentPage: 'search',
        showCookieBanner: true,
        showPromoModal: false,
        form: { origin: '', destination: '', travelClass: '' },
        trains: [
          { id: 1, name: 'Shatabdi Express', time: '06:00 – 12:30' },
          { id: 2, name: 'Rajdhani Express', time: '20:00 – 08:15' },
          { id: 3, name: 'Duronto Express', time: '22:30 – 10:00' },
        ],
        selectedTrain: null,
        bookingId: '',

        submitSearch() {
          if (!this.form.origin || !this.form.destination || !this.form.travelClass) {
            return;
          }
          history.pushState({}, '', '/results');
          this.currentPage = 'results';
        },
        selectTrain(train) {
          this.selectedTrain = train;
          history.pushState({}, '', '/confirm');
          this.currentPage = 'confirm';
        },
        confirmBooking() {
          this.bookingId = 'PNR' + Math.floor(Math.random() * 9000000000 + 1000000000);
          history.pushState({}, '', '/done');
          this.currentPage = 'done';
        },
      };
    }
  </script>
</body>
</html>
